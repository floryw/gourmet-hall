{% extends 'base.html' %}

{% block content %}

<form method="post" action="{% url 'login' %}" class="mx-auto p-2" style="width: 800px;"> 
    {% csrf_token %}




    <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
    <div class="form-floating"> <input type="text" class="form-control" id="floatingInput"
            placeholder="name@example.com" name="username"> <label for="floatingInput">Email address</label> </div>
    <div class="form-floating"> <input type="password" class="form-control" id="floatingPassword"
            placeholder="Password" name="password"> <label for="floatingPassword">Password</label> </div>
    {% if form.errors %}
        <div class="alert alert-danger my-3" role="alert">
            Неправильный логин или пароль
        </div>
    {% endif %}
    <div class="form-check text-start my-3"> <input class="form-check-input" type="checkbox" value="remember-me"
            id="checkDefault"> <label class="form-check-label" for="checkDefault">
            Remember me
        </label> </div> <button class="btn btn-primary w-100 py-2" type="submit" value="login">Sign in</button>
        <p><a href="#">Забыл пароль? </a></p>
    <p class="mt-5 mb-3 text-body-secondary">© 2017–2025</p>
</form>


{% endblock %}
